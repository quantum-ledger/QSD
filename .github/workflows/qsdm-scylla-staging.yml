# Single-node Scylla in Docker + scyllasmoke + integration test (build tag scylla).
# Use when Docker is unavailable locally, or to validate storage after Scylla-related changes.

name: QSDM Scylla staging verify

permissions:
  contents: read

concurrency:
  group: qsdm-scylla-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - "QSDM/source/pkg/storage/scylla.go"
      - "QSDM/source/pkg/storage/scylla_integration_test.go"
      - "QSDM/source/pkg/storage/scylla_options_test.go"
      - "QSDM/source/cmd/scyllasmoke/**"
      - "QSDM/scripts/scylla-staging-verify.*"
      - "QSDM/scripts/scylla-staging-verify-with-docker.*"
      # Tracks this workflow file. The old path was "qsdm-scylla-
      # staging.yml" (pre-rebrand); the file was renamed to "qsdm-
      # scylla-staging.yml" but the filter was missed, so self-edits
      # to this YAML were silently not retriggering the job.
      - ".github/workflows/qsdm-scylla-staging.yml"
  pull_request:
    paths:
      - "QSDM/source/pkg/storage/scylla.go"
      - "QSDM/source/pkg/storage/scylla_integration_test.go"
      - "QSDM/source/pkg/storage/scylla_options_test.go"
      - "QSDM/source/cmd/scyllasmoke/**"
      - "QSDM/scripts/scylla-staging-verify.*"
      - "QSDM/scripts/scylla-staging-verify-with-docker.*"
      - ".github/workflows/qsdm-scylla-staging.yml"

jobs:
  scylla-staging-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: QSDM/source/go.mod

      # scylla-staging-verify.sh invokes `go build` / `go test` under
      # the `scylla` build tag. That compiles the full module -- which
      # transitively drags in pkg/crypto/dilithium.go (CGO-gated import
      # of <oqs/oqs.h>). Without liboqs on the build path every attempt
      # fails with:
      #
      #     pkg/crypto/dilithium.go:6:10: fatal error: oqs/oqs.h: No
      #     such file or directory
      #
      # which then loops 90 times through the retry budget before the
      # step gives up. Install liboqs the same way test-cgo-transaction
      # and govulncheck do so the compile actually succeeds.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev

      - name: Cache liboqs install
        id: liboqs-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: QSDM/liboqs_install
          key: liboqs-install-${{ runner.os }}-${{ hashFiles('QSDM/scripts/rebuild_liboqs.sh') }}

      - name: Build liboqs
        if: steps.liboqs-cache.outputs.cache-hit != 'true'
        working-directory: QSDM
        run: chmod +x scripts/rebuild_liboqs.sh && ./scripts/rebuild_liboqs.sh

      - name: Start Scylla (single-node, low memory)
        run: |
          docker run -d --name qsdm-scylla-ci -p 9042:9042 scylladb/scylla:6.2 \
            --smp 1 --memory 750M --overprovisioned 1 --developer-mode 1

      - name: Wait for cluster + run staging verify
        env:
          SCYLLA_HOSTS: 127.0.0.1
          SCYLLA_KEYSPACE: qsdm
          SCYLLA_AUTO_CREATE_KEYSPACE: "1"
          QSDM_METRICS_REGISTER_STRICT: "1"
        run: |
          set -e
          LIBOQS="${GITHUB_WORKSPACE}/QSDM/liboqs_install"
          if [ -d "$LIBOQS/lib64" ]; then L="$LIBOQS/lib64"; else L="$LIBOQS/lib"; fi
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I${LIBOQS}/include"
          export CGO_LDFLAGS="-L${L} -loqs"
          export LD_LIBRARY_PATH="${L}:${LD_LIBRARY_PATH:-}"
          ok=0
          for i in $(seq 1 90); do
            if bash QSDM/scripts/scylla-staging-verify.sh; then ok=1; break; fi
            echo "staging verify attempt $i/90 failed, sleeping 5s..."
            sleep 5
          done
          if [ "$ok" != 1 ]; then
            echo "::error::Scylla staging verify did not succeed within retry budget"
            exit 1
          fi

      - name: Stop Scylla
        if: always()
        run: docker rm -f qsdm-scylla-ci 2>/dev/null || true
