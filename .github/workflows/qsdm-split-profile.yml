name: QSDM split-profile build

# Major Update Phase 2.3 ratified that the node ships in two profiles:
#   - validator (CPU-only, PoE+BFT consensus; default build)
#   - miner     (adds the GPU miner runtime; requires extra deps)
# This workflow proves both profiles build cleanly on every push so we
# catch drift (missing build tags, accidental cross-imports, dependency
# skew) *before* it reaches the release-container workflow.
#
# Scope is deliberately narrow: each job only compiles and runs the
# tests that are valid for that profile, plus a docker `build` (no push)
# against the matching Dockerfile. Heavy integration tests stay in the
# main qsdm-go.yml workflow.

permissions:
  contents: read

concurrency:
  group: qsdm-split-profile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - "QSDM/source/**"
      - "QSDM/Dockerfile*"
      - "QSDM/scripts/**"
      - ".github/workflows/qsdm-split-profile.yml"
  pull_request:
    paths:
      - "QSDM/source/**"
      - "QSDM/Dockerfile*"
      - "QSDM/scripts/**"
      - ".github/workflows/qsdm-split-profile.yml"

jobs:
  go-profile-matrix:
    name: go build+test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: validator
            tags: "validator_only"
            # Packages to compile+test under the validator profile. The
            # pkg/mining package stays in the list so we catch any
            # accidental symbols that cross the validator/miner build
            # tag boundary. cmd/qsdmminer and cmd/qsdmminer-console are
            # both excluded because they only compile under the default
            # (full) profile.
            # pkg/buildinfo is in both profiles because every release
            # artefact (validator-profile trustcheck included) imports
            # it for --version output; drift here would break the
            # linux/amd64 "--version smoke" in release-container.yml.
            packages: "./pkg/mining/... ./pkg/config/... ./pkg/branding/... ./pkg/buildinfo/... ./pkg/chain/... ./pkg/audit/... ./cmd/trustcheck/..."
          - profile: full
            tags: ""
            packages: "./pkg/mining/... ./cmd/qsdmminer/... ./cmd/qsdmminer-console/... ./pkg/config/... ./pkg/branding/... ./pkg/buildinfo/... ./pkg/chain/... ./pkg/audit/... ./cmd/trustcheck/..."

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: QSDM/source/go.mod

      - name: go vet (${{ matrix.profile }})
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go vet -tags="${{ matrix.tags }}" ${{ matrix.packages }}
          else
            go vet ${{ matrix.packages }}
          fi

      - name: go test -short (${{ matrix.profile }})
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
          QSDM_METRICS_REGISTER_STRICT: "1"
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go test -tags="${{ matrix.tags }}" -short -count=1 -timeout 10m ${{ matrix.packages }}
          else
            go test -short -count=1 -timeout 10m ${{ matrix.packages }}
          fi

      - name: go build qsdm (${{ matrix.profile }})
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags="${{ matrix.tags }}" -o /tmp/qsdm-${{ matrix.profile }} ./cmd/qsdm
          else
            go build -o /tmp/qsdm-${{ matrix.profile }} ./cmd/qsdm
          fi

      - name: Report build profile
        run: |
          echo "Built QSDM node binary with profile=${{ matrix.profile }} (tags='${{ matrix.tags }}')"
          ls -la /tmp/qsdm-${{ matrix.profile }}

      # Protocol self-test runs only under the full profile because
      # both miner binaries depend on pkg/mining (which is absent from
      # the validator_only tag build surface). The two self-tests
      # exercise the same pkg/mining.Solve + Verify round-trip against
      # independent mains, so if one drifts from MINING_PROTOCOL.md
      # and the other does not, the mismatch shows up here at push
      # time — not at release-tagging time. Keeping both calls in one
      # step (set -e is default) means a single exit code captures
      # both checks.
      - name: Protocol self-test (qsdmminer + qsdmminer-console)
        if: matrix.profile == 'full'
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          echo "=== qsdmminer --self-test ==="
          go run ./cmd/qsdmminer --self-test
          echo "=== qsdmminer-console --self-test ==="
          go run ./cmd/qsdmminer-console --self-test

      # --version smoke: every release artefact must accept --version
      # and honour pkg/buildinfo.-X injection. Catching a missing wire
      # here (e.g. someone adding a new cmd/ but forgetting the flag)
      # means the release workflow never ships a "dev"/"unknown"
      # binary in production.
      #
      # The test injects synthetic -X values and asserts they appear
      # in the output, which is the exact path release-container.yml
      # takes on every tag push.
      - name: --version smoke (buildinfo ldflags injection)
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          TEST_VER="v0.0.0-citest"
          TEST_SHA="citest7"
          TEST_DATE="2026-04-22T00:00:00Z"
          LDFLAGS="-X github.com/blackbeardONE/QSDM/pkg/buildinfo.Version=${TEST_VER} \
                   -X github.com/blackbeardONE/QSDM/pkg/buildinfo.GitSHA=${TEST_SHA} \
                   -X github.com/blackbeardONE/QSDM/pkg/buildinfo.BuildDate=${TEST_DATE}"
          # Validator-only profile: the two tooling binaries are in
          # scope (they build with validator_only). Miner binaries
          # are added only on full because they require the miner
          # runtime.
          # NOTE: cmd/qsdmminer is intentionally NOT in this list as of
          # v0.3.2 — the v1 reference miner is no longer a release
          # artefact (mainnet rejects v1 proofs; see
          # release-container.yml). Its --self-test still runs above
          # because the v1 ComputeMixDigest code path stays in tree
          # for protocol audit + replay, but it does not need
          # buildinfo-ldflags wiring because there's no release binary
          # to ldflags-stamp.
          if [ "${{ matrix.profile }}" = "full" ]; then
            BINS="qsdmminer-console trustcheck genesis-ceremony"
          else
            BINS="trustcheck genesis-ceremony"
          fi
          for bin in $BINS; do
            out="$(go run -ldflags "${LDFLAGS}" ./cmd/${bin} --version)"
            echo "${bin}: ${out}"
            echo "${out}" | grep -q "${TEST_VER}" || { echo "FAIL: ${bin} missing injected version"; exit 1; }
            echo "${out}" | grep -q "${TEST_SHA}" || { echo "FAIL: ${bin} missing injected sha"; exit 1; }
          done

  trustcheck-integration:
    name: trustcheck integration (built binary vs fixture)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs in a dedicated Linux job because the integration tests
    # exec the built trustcheck binary as a child process against an
    # in-process httptest server. Matches the external-scraper path a
    # third party (e.g. a monitoring service) would exercise from
    # outside the node.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: QSDM/source/go.mod

      - name: go test -run Integration ./cmd/trustcheck/...
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 -timeout 5m -run Integration ./cmd/trustcheck/...

      - name: Build trustcheck with -trimpath (reproducibility smoke)
        working-directory: QSDM/source
        env:
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w" -o /tmp/trustcheck ./cmd/trustcheck
          ls -la /tmp/trustcheck
          /tmp/trustcheck --help 2>&1 | head -n 40 || true

  docker-validator-build:
    name: docker build (validator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build validator image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: QSDM
          file: QSDM/Dockerfile.validator
          push: false
          tags: qsdm-validator:ci
          cache-from: type=gha,scope=qsdm-validator
          cache-to: type=gha,mode=max,scope=qsdm-validator

  docker-miner-build:
    name: docker build (miner)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build miner image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: QSDM
          file: QSDM/Dockerfile.miner
          push: false
          tags: qsdm-miner:ci
          cache-from: type=gha,scope=qsdm-miner
          cache-to: type=gha,mode=max,scope=qsdm-miner

