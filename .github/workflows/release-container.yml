        with:
          image: ${{ steps.imgbase.outputs.ref }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/qsdm-miner-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Cosign-sign miner image
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          DIGEST_REF="${{ steps.imgbase.outputs.ref }}@${{ steps.build.outputs.digest }}"
          cosign attest --yes \
            --predicate /tmp/qsdm-miner-sbom.spdx.json \
            --type spdxjson \
            "$DIGEST_REF"
