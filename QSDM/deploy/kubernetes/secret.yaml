apiVersion: v1
kind: Secret
metadata:
  name: QSD-secrets
  namespace: QSD
type: Opaque
stringData:
  # TLS certificates (base64 encoded)
  # In production, use proper certificate management
  # tls_cert: ""
  # tls_key: ""
  
  # API keys (if needed) — replace with operator-supplied secret;
  # never commit a real value. The string below is an obvious
  # placeholder, NOT a default credential.
  # api_key: "<replace-with-strong-secret>"
  
  # Database credentials (if using ScyllaDB) — same rule as above:
  # always replace before applying. Both fields are placeholders.
  # scylla_username: "<replace-with-scylla-username>"
  # scylla_password: "<replace-with-scylla-password>"

