apiVersion: v1
kind: Service
metadata:
  name: QSD-service
  namespace: QSD
  labels:
    app: QSD
spec:
  type: ClusterIP
  ports:
  - name: network
    port: 4001
    targetPort: network
    protocol: TCP
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  - name: dashboard
    port: 8081
    targetPort: dashboard
    protocol: TCP
  - name: logviewer
    port: 9000
    targetPort: logviewer
    protocol: TCP
  selector:
    app: QSD
    component: node
  clusterIP: None  # Headless service for StatefulSet

---
apiVersion: v1
kind: Service
metadata:
  name: QSD-dashboard
  namespace: QSD
  labels:
    app: QSD
    component: dashboard
spec:
  type: LoadBalancer
  ports:
  - name: dashboard
    port: 8081
    targetPort: dashboard
    protocol: TCP
  selector:
    app: QSD
    component: node

---
apiVersion: v1
kind: Service
metadata:
  name: QSD-api
  namespace: QSD
  labels:
    app: QSD
    component: api
spec:
  type: LoadBalancer
  ports:
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  selector:
    app: QSD
    component: node

