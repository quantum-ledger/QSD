apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: QSD-node
  namespace: QSD
  labels:
    app: QSD
    component: node
spec:
  serviceName: QSD-service
  replicas: 3
  selector:
    matchLabels:
      app: QSD
      component: node
  template:
    metadata:
      labels:
        app: QSD
        component: node
    spec:
      containers:
      - name: QSD
        image: QSD:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: network
          containerPort: 4001
          protocol: TCP
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: dashboard
          containerPort: 8081
          protocol: TCP
        - name: logviewer
          containerPort: 9000
          protocol: TCP
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NETWORK_PORT
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: network_port
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: api_port
        - name: DASHBOARD_PORT
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: dashboard_port
        - name: LOG_VIEWER_PORT
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: log_viewer_port
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: storage_type
        - name: SQLITE_PATH
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: sqlite_path
        - name: LOG_FILE
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: log_file
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: log_level
        - name: ENABLE_TLS
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: enable_tls
        - name: API_RATE_LIMIT_MAX
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: api_rate_limit_max
        - name: API_RATE_LIMIT_WINDOW
          valueFrom:
            configMapKeyRef:
              name: QSD-config
              key: api_rate_limit_window
        # Headless service DNS for StatefulSet peers (override via patch if topology differs)
        - name: BOOTSTRAP_PEERS
          value: "QSD-node-0.QSD-service.QSD.svc.cluster.local:4001"
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: api
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: api
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: logs
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

