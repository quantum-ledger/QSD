# QSD miner DaemonSet
# --------------------
# Deploys the QSD miner image (built from QSD/Dockerfile.miner) as a
# DaemonSet so there is at most one miner pod per GPU node. Miners run the
# additive Proof-of-Work emission layer that mints Cell coins; they are
# completely separate from the validator consensus layer.
#
# Assumptions encoded in this manifest:
#
#   - GPU nodes are labelled `QSD.tech/node-class=gpu` and optionally tainted
#     `nvidia.com/gpu=true:NoSchedule` to keep non-miner workloads off them.
#   - nvidia-device-plugin-daemonset (or GPU Operator) is already running in
#     the cluster so `nvidia.com/gpu` resources are schedulable.
#   - The QSD validator service (from validator-statefulset.yaml) is
#     reachable at `QSD-validator-0.QSD-validator.QSD.svc.cluster.local`;
#     miners talk to it over HTTP for epoch / difficulty / proof submission.
#
# See QSD/docs/docs/NODE_ROLES.md and QSD/docs/docs/MINER_QUICKSTART.md.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: QSD-miner
  namespace: QSD
  labels:
    app: QSD
    component: miner
    QSD.tech/role: miner
spec:
  selector:
    matchLabels:
      app: QSD
      component: miner
  template:
    metadata:
      labels:
        app: QSD
        component: miner
        QSD.tech/role: miner
    spec:
      nodeSelector:
        QSD.tech/node-class: gpu
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "QSD.tech/role"
        operator: "Equal"
        value: "miner"
        effect: "NoSchedule"
      runtimeClassName: nvidia
      containers:
      - name: QSD-miner
        image: QSD/miner:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: network
          containerPort: 4001
          protocol: TCP
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: dashboard
          containerPort: 8081
          protocol: TCP
        env:
        - name: QSD_NODE_ROLE
          value: "miner"
        - name: QSD_MINING_ENABLED
          value: "true"
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        # Point the miner at the validator service (the miner never runs
        # consensus; it only submits proofs).
        - name: QSD_VALIDATOR_URL
          value: "http://QSD-validator-0.QSD-validator.QSD.svc.cluster.local:8080"
        envFrom:
        - configMapRef:
            name: QSD-config
            optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        # Writable scratch for processes that need /tmp under a
        # read-only root filesystem (Go's os.TempDir, libp2p
        # ephemeral state, CUDA driver cache).
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: api
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: api
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          # runtime-01: container runs as a non-root UID. The
          #             miner image (Dockerfile.miner) sets
          #             USER 65532 at build time.
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          # runtime-02: read-only root filesystem. Writable paths
          #             are mounted explicitly: /app/data (emptyDir),
          #             /app/logs (emptyDir), /tmp (emptyDir).
          readOnlyRootFilesystem: true
          # runtime-03: drop ALL Linux capabilities; the miner
          #             needs no privileged operations (CUDA
          #             devices are accessed via the nvidia
          #             runtime class, not a Linux capability).
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          # runtime-04: RuntimeDefault seccomp profile. The miner
          #             needs the same syscall surface as the
          #             validator plus CUDA ioctl which is already
          #             in the default allowlist.
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
