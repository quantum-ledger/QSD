# Example Prometheus scrape_config fragment for QSD dashboard metrics.
# Copy the job into your prometheus.yml under scrape_configs: [...]
#
# Prerequisites:
#   - Node dashboard listening (default port 8081)
#   - [monitoring] metrics_scrape_secret set on the node, OR use a JWT bearer (not shown here)
#
# Replace DASHBOARD_HOST, DASHBOARD_PORT, and the bearer token with your values.

scrape_configs:
  - job_name: QSD-dashboard
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /api/metrics/prometheus
    scheme: http
    static_configs:
      - targets:
          - DASHBOARD_HOST:DASHBOARD_PORT
    authorization:
      type: Bearer
      credentials: PASTE_METRICS_SCRAPE_SECRET_HERE

  # If you cannot use Bearer, run a small proxy that adds X-QSD-Metrics-Scrape-Secret,
  # or use Prometheus file_sd / blackbox with a script exporter.
