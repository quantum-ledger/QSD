  # -------------------------------------------------------------------
  # QSD-v2-attest-recent-rejections — §4.6 rejection-ring health
  # REJECTION_FLOOD.md §7.1 / §7.2 / §7.3 / §7.4 / §7.5
  # -------------------------------------------------------------------

  - name: "QSDAttestRejectionFieldTruncationSustained — truncated/observed > 0.25, for:15m"
    interval: 1m
    # truncated 30/min, observed 60/min → ratio = 0.5.
    input_series:
      - series: 'QSD_attest_rejection_field_truncated_total'
        values: '0+30x40'
      - series: 'QSD_attest_rejection_field_runes_observed_total'
        values: '0+60x40'
    alert_rule_test:
      - eval_time: 10m
        alertname: QSDAttestRejectionFieldTruncationSustained
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 26m
        alertname: QSDAttestRejectionFieldTruncationSustained
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-rejection-flood.json"
            description: "QSD_attest_rejection_field_truncated_total{field=\"\"}\nis firing on 50% of observed\nrejections over the last 10 minutes. Possible causes:\n  - A miner is stuffing the proof envelope with an\n    oversized payload to drown debugging signal —\n    cross-check QSD_attest_archspoof_rejected_total\n    and the v2-mining-slashing group; if the offender\n    is identifiable, slash via the §8 evidence path.\n  - A recent verifier release emits longer\n    RejectError.Detail strings than the cap allows —\n    check the latest QSD release notes for any\n    §4.6 verifier change, then raise the cap in\n    pkg/mining/attest/recentrejects/recentrejects.go\n    (maxDetailRunes / maxGPUNameRunes /\n    maxCertSubjectRunes) and ship a CHANGELOG entry.\n  - A cert_subject containing significant non-ASCII\n    content (multi-byte unicode in CN/SAN) — verify\n    via QSD_attest_rejection_field_runes_max and\n    the operator's NVIDIA cert chain.\nTriage:\n  - Identify the worst offender field:\n      topk(3, rate(QSD_attest_rejection_field_truncated_total[10m]))\n  - Check headroom against the cap:\n      QSD_attest_rejection_field_runes_max{field=\"\"}\n  - Inspect a recent rejection record for the offending\n    payload directly:\n      GET /api/v1/attest/recent-rejections?limit=20\n    or:\n      QSDcli watch archspoof --detailed\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/REJECTION_FLOOD.md#74-mode-d--QSDattestrejectionfieldtruncationsustained"
            summary: ": recent-rejection ring is truncating  >25% of the time"

  - name: "QSDAttestRejectionFieldRunesMaxNearCap — detail rune-cap >= 180, for:30m"
    interval: 1m
    input_series:
      - series: 'QSD_attest_rejection_field_runes_max{field="detail"}'
        values: '200x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDAttestRejectionFieldRunesMaxNearCap
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDAttestRejectionFieldRunesMaxNearCap
