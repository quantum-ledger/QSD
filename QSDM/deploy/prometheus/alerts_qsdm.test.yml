        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 11m
        alertname: QSDMiningMempoolBacklog
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-mining-liveness.json"
            description: "QSD_mempool_size is 20000. Either traffic spiked\npast producer throughput, or the admission gate is\nletting through txs that ApplySlashTx / ApplyEnrollTx\nreject at apply time (admission stateless, applier\nstateful — a known divergence vector).\nCross-check QSD_slash_rejected_total and\nQSD_enrollment_rejected_total; high rejection rate\nmeans admission is not catching what apply does.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/MINING_LIVENESS.md#32-mode-b--QSDminingmempoolbacklog"
            summary: ": mempool >10k pending for 10m"

  # -------------------------------------------------------------------
