        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 40m
        alertname: QSDHotReloadDryRunDegraded
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "info"
            subsystem: "v2-hotreload"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-hot-reload-incident.json"
            description: "On i1 the most-recent\nhot-reload dry-run reports\nQSD_hot_reload_last_dry_run_load_ok == 0 or\nQSD_hot_reload_last_dry_run_policy_ok == 0\nsustained for ≥30m. The on-disk config either\ndoesn't parse cleanly or fails the policy\nguard. The next planned apply WILL fail —\nthis is the precursor signal to\nQSDHotReloadApplyFailures.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/HOT_RELOAD_INCIDENT.md#32-mode-b--QSDhotreloaddryrundegraded"
            summary: "i1: last hot-reload dry-run failed load or policy for ≥30m"

