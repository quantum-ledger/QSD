  # -------------------------------------------------------------------
  # QSD-v2-mining-slashing
  # SLASHING_INCIDENT.md §3.1 / §3.2 / §3.3 / §3.4
  # -------------------------------------------------------------------

  - name: "QSDMiningSlashApplied — sum(increase) >= 1 in 15m, for:1m"
    interval: 1m
    input_series:
      - series: 'QSD_slash_applied_total{reason="dust"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 0m
        alertname: QSDMiningSlashApplied
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 20m
        alertname: QSDMiningSlashApplied
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-slashing-incident.json"
            description: "At least one QSD_slash_applied_total has incremented\nin the last 15m. Break out by kind:\n  sum by (kind) (increase(QSD_slash_applied_total[15m]))\nCross-reference the transaction id via:\n  GET /api/v1/mining/slash/{tx_id}\n(the QSD CLI: `QSDcli slash-receipt <tx-id>`).\nConfirm the offender's NodeID, EvidenceKind, and that\nauto_revoked behaved as expected. If kind=\"forged-attestation\"\nin volume, suspect a CC-AIK verifier regression in the\nrelease first (false positives) before assuming widespread\ncheating.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/SLASHING_INCIDENT.md#31-mode-a--QSDminingslashapplied"
            summary: ": slash transaction applied"

  - name: "QSDMiningSlashedDustBurst — dust drained > 5e10 in 15m, for:5m"
    interval: 1m
    # Increase 1e10/min → 15m increase = 1.5e11 (3x threshold).
    input_series:
      - series: 'QSD_slash_drained_dust_total{reason="dust"}'
        values: '0+10000000000x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningSlashedDustBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 21m
        alertname: QSDMiningSlashedDustBurst
        exp_alerts:
        - exp_labels:
            severity: "critical"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-slashing-incident.json"
            description: "QSD_slash_drained_dust_total has increased by\n150G dust in 15m (>50 CELL). Multiple\nrigs being slashed at once is almost never coincidental —\nsuspect either a coordinated cheat ring (great, ratify\nand continue) OR a verifier regression that just shipped\nin the latest release (bad, roll back).\n\nTriage:\n  - Group by EvidenceKind:\n      sum by (kind) (increase(QSD_slash_drained_dust_total[15m]))\n    A single dominant kind = single-source bug.\n  - Compare against pre-release baseline:\n      sum(rate(QSD_slash_drained_dust_total[1d] offset 1d))\n  - Spot-check a recent slash receipt:\n      QSDcli slash-receipt <tx-id>\n    If outcome=applied but the operator was clean, halt\n    rollout and roll back the verifier release.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/SLASHING_INCIDENT.md#32-mode-b--QSDminingslasheddustburst"
            summary: ": >50 CELL slashed in 15m"

  - name: "QSDMiningSlashRejectionsBurst — sum(increase) >= 10 in 10m, for:5m"
    interval: 1m
    input_series:
      - series: 'QSD_slash_rejected_total{reason="evidence"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningSlashRejectionsBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMiningSlashRejectionsBurst
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-slashing-incident.json"
            description: "QSD_slash_rejected_total grew by 10 in 10m.\nBreak out by reason:\n  sum by (reason) (increase(QSD_slash_rejected_total[10m]))\nCommon reasons and what they mean:\n  evidence_replayed   — replay protection working;\n                        likely a buggy slasher retrying.\n  verifier_failed     — evidence didn't pass the\n                        EvidenceVerifier; either malformed\n                        or a probe.\n  node_not_enrolled   — slash submitted against an\n                        unknown NodeID; client bug or\n                        spam.\n  insufficient_stake  — slash amount exceeded available\n                        bond; clamp client-side.\nSustained \"verifier_failed\" with no applied slashes\nsuggests an outsider probing the endpoint — fine, but\nconsider rate-limiting upstream of admission.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/SLASHING_INCIDENT.md#33-mode-c--QSDminingslashrejectionsburst"
            summary: ": ≥10 slash transactions rejected in 10m"

  - name: "QSDMiningAutoRevokeBurst — sum(increase) >= 3 in 15m, for:5m"
    interval: 1m
    input_series:
      - series: 'QSD_slash_auto_revoked_total{reason="threshold"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningAutoRevokeBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 21m
        alertname: QSDMiningAutoRevokeBurst
        exp_alerts:
        - exp_labels:
            severity: "critical"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-slashing-incident.json"
            description: "SlashApplier.RevokeIfUnderBonded fired for 15\nrecords in 15m. Each fire means the slashed miner's\nremaining bond fell below mining.MinEnrollStakeDust\n(10 CELL). Three+ in 15m is unusual — investigate\nwhether the slash amounts were correctly clamped to\nindividual rig stake or whether the ApplySlashTx path\nis double-debiting.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/SLASHING_INCIDENT.md#34-mode-d--QSDminingautorevokeburst"
            summary: ": ≥3 records auto-revoked by SlashApplier in 15m"

