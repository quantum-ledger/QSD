  - name: "QSDMiningRegistryEmpty — active=0 and uptime>600, for:15m"
    interval: 1m
    input_series:
      - series: 'QSD_enrollment_active_count'
        values: '0x30'
      - series: 'QSD_process_uptime_seconds'
        values: '700+60x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningRegistryEmpty
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDMiningRegistryEmpty
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-enrollment-incident.json"
            description: "QSD_enrollment_active_count is 0 on a node that has\nbeen up >10m. Either:\n  - All miners legitimately unenrolled (check\n    QSD_unenrollment_applied_total rate over the last\n    hour).\n  - The mempool admission gate is rejecting every\n    enrollment (check QSD_enrollment_rejected_total\n    by reason).\n  - The block producer stopped sealing — cross-check\n    with QSDMiningChainStuck below.\nProduction v2 mainnet should never sit at active=0;\non testnet this may be acceptable during quiet periods.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#31-mode-a--QSDminingregistryempty"
            summary: ": zero active enrollments for 15m"

  - name: "QSDMiningRegistryShrinkingFast — >25% drop over 1h with baseline >= 4, for:10m"
    interval: 1m
    # Stay at 10 for first 70m (1h+ stable history), then drop
    # to 4. offset 1h at t=86m → t=26m where count was 10.
    # (10-4)/10 = 0.6 > 0.25.
    input_series:
      - series: 'QSD_enrollment_active_count'
        values: '10x70 4x30'
    alert_rule_test:
      - eval_time: 75m
        alertname: QSDMiningRegistryShrinkingFast
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 86m
        alertname: QSDMiningRegistryShrinkingFast
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-enrollment-incident.json"
            description: "QSD_enrollment_active_count dropped by 60%\nin 1h (relative to the 1h-prior reading). Cross-correlate with:\n  - rate(QSD_unenrollment_applied_total[1h])  — voluntary exits\n  - rate(QSD_slash_applied_total[1h])         — forced exits\n  - rate(QSD_enrollment_unbond_swept_total[1h]) — final-stage sweeps\nIf voluntary exits dominate, suspect either a release\nregression (miners hitting a v2-incompatible build) or\nan external incident (e.g. NVIDIA driver rollout). If\nslash-driven, switch to the slashing-group runbook.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#32-mode-b--QSDminingregistryshrinkingfast"
            summary: ": active enrollments fell 60% in 1h"

  - name: "QSDMiningPendingUnbondMajority — pending/total > 0.5 with total >= 4, for:30m"
    interval: 1m
    # active=2, pending=3, total=5≥4, ratio=3/5=0.6>0.5.
    input_series:
      - series: 'QSD_enrollment_active_count'
        values: '2x40'
      - series: 'QSD_enrollment_pending_unbond_count'
        values: '3x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDMiningPendingUnbondMajority
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDMiningPendingUnbondMajority
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-enrollment-incident.json"
            description: "More than half of the bonded population is in the 7-day\nunbond window. Compare:\n  QSD_enrollment_pending_unbond_count\n  QSD_enrollment_active_count\n  QSD_enrollment_pending_unbond_dust  (CELL locked)\n  QSD_enrollment_bonded_dust          (CELL active)\nCoordinated exit usually precedes a fork-vote, a\nclient-software regression, or a known driver rollout\nincompatibility. Investigate before the 7-day sweep\nwindow closes — once balances credit back, recovery\nrequires re-enrollment with fresh bond.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#33-mode-c--QSDminingpendingunbondmajority"
            summary: ": 60% of bonded miners pending unbond"

  - name: "QSDMiningEnrollmentRejectionsBurst — sum(increase) >= 20 in 10m, for:5m"
    interval: 1m
    # 2/min → increase[10m] = 20.
    input_series:
      - series: 'QSD_enrollment_rejected_total{reason="bond_too_small"}'
        values: '0+2x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningEnrollmentRejectionsBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 17m
        alertname: QSDMiningEnrollmentRejectionsBurst
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-enrollment-incident.json"
            description: "QSD_enrollment_rejected_total grew by 20 in\n10m. Break out by reason:\n  sum by (reason) (increase(QSD_enrollment_rejected_total[10m]))\nCommon reasons:\n  insufficient_stake — client offered <10 CELL bond.\n  gpu_uuid_collision — two NodeIDs claimed the same GPU.\n  malformed_payload  — old client / canonicaljson drift.\n  duplicate_node_id  — re-enroll without unbond first.\nSustained \"malformed_payload\" after a release suggests\nclient-server skew — pin client minimum version in the\nquickstart docs.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#34-mode-d--QSDminingenrollmentrejectionsburst"
            summary: ": ≥20 enrollment rejections in 10m"

  - name: "QSDMiningBondedDustDropped — bond drops > 5e10 over 30m, for:10m"
    interval: 1m
    # Stay at 1e11 for 30m, then drop to 4e10 → drop=6e10>5e10.
    input_series:
      - series: 'QSD_enrollment_bonded_dust'
        values: '100000000000x30 40000000000x30'
    alert_rule_test:
      - eval_time: 35m
        alertname: QSDMiningBondedDustDropped
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 46m
        alertname: QSDMiningBondedDustDropped
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-mining"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-enrollment-incident.json"
            description: "Total active bond fell by 60G dust\n(>50 CELL) in 30m. Decompose:\n  - Voluntary: rate(QSD_unenrollment_applied_total[30m])\n  - Forced:    rate(QSD_slash_drained_dust_total[30m])\n  - Sweep:     rate(QSD_enrollment_unbond_swept_total[30m])\nIf neither driver explains the magnitude, suspect a\nmetric callback regression (the gauge is read live from\nEnrollmentStateProvider — a stale provider will read\nstale numbers).\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ENROLLMENT_INCIDENT.md#35-mode-e--QSDminingbondeddustdropped"
            summary: ": bonded stake dropped >50 CELL in 30m"

