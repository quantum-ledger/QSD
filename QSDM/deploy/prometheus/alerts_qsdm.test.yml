  - name: "QSDHotReloadApplyFailures — apply_failure rate > 0 for 5m, for:10m"
    interval: 1m
    # 1 apply failure per minute → rate > 0. The 5m
    # rate window saturates at 5m, then for:10m fires
    # at 15m.
    input_series:
      - series: 'QSD_hot_reload_apply_failure_total{instance="i1"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 9m
        alertname: QSDHotReloadApplyFailures
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDHotReloadApplyFailures
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-hotreload"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-hot-reload-incident.json"
            description: "QSD_hot_reload_apply_failure_total on\ni1 has been incrementing for\n≥10m. Live config-swap attempts are being\nrejected by the in-process reload path; the\nvalidator is running on the previous config\nuntil the swap path is fixed.\n\nLikely:\n  - On-disk config has a syntactic / semantic\n    regression (the dry-run guard would catch\n    this — see QSDHotReloadDryRunDegraded).\n  - A reloader hook (subsystem-specific\n    Apply()) is failing — read the validator\n    logs for the specific subsystem error.\n  - Lock contention on a config-mutex if a\n    deploy script is hammering the apply\n    endpoint.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/HOT_RELOAD_INCIDENT.md#31-mode-a--QSDhotreloadapplyfailures"
            summary: "i1: hot-reload apply failures sustained for ≥10m"

  - name: "QSDHotReloadDryRunDegraded — load_ok=0 with timestamp>0, for:30m"
    interval: 1m
    # load_ok stays at 0, timestamp = 1700000000 (non-
    # zero static). Fires for:30m at 30m.
