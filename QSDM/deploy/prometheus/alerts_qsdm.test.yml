  - name: "QSDMiningMempoolBacklog — mempool > 10000, for:10m"
    interval: 1m
    input_series:
      - series: 'QSD_mempool_size'
        values: '20000x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDMiningMempoolBacklog
