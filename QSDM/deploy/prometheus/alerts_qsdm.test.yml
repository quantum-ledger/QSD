  - name: "QSDAttestArchSpoofUnknownArchBurst — rate{unknown_arch} > 0.1, for:10m"
    interval: 1m
    # 12/min = 0.2/s; 2x the 0.1/s threshold.
    input_series:
      - series: 'QSD_attest_archspoof_rejected_total{reason="unknown_arch"}'
        values: '0+12x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDAttestArchSpoofUnknownArchBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDAttestArchSpoofUnknownArchBurst
        exp_alerts:
        - exp_labels:
            reason: "unknown_arch"
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-arch-spoof-incident.json"
            description: "QSD_attest_archspoof_rejected_total{reason=\"unknown_arch\"}\nclimbing at 0.2/s over 5m. Either:\n  - A miner client running an unreleased GPU arch\n    (e.g. \"rubin\", a hypothetical post-Blackwell)\n    is auto-retrying. Tighten quickstart docs.\n  - External prober scanning the v2 attestation\n    surface. Confirm via source IP distribution in\n    ingress logs; consider rate-limiting upstream.\n  - Client/server skew on alias canonicalisation\n    (e.g. miner emits \"ada\" but server hasn't\n    landed alias yet). Cross-check release versions.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/ARCH_SPOOF_INCIDENT.md#31-mode-a--QSDattestarchspoofunknownarchburst"
            summary: ": sustained unknown-arch rejections"

  - name: "QSDAttestArchSpoofGPUNameMismatch — rate{gpu_name_mismatch} > 0.05, for:10m"
    interval: 1m
