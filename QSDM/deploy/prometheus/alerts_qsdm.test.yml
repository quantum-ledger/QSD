            field: "detail"
            severity: "info"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-rejection-flood.json"
            description: "QSD_attest_rejection_field_runes_max{field=\"detail\"}\nhas reached 200 runes — within 10% of the\nin-store cap (200 runes for detail, 256 for gpu_name\nand cert_subject). The ring will continue to truncate\nharmlessly, but if observed proofs are getting close\nto the cap consider whether the cap should be raised\nin pkg/mining/attest/recentrejects/recentrejects.go.\nThis alert is informational — it should not page;\nwire it to a passive channel (chat ping) so operators\nsee the ramp before the truncation-rate alert above\ncrosses 25%.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/REJECTION_FLOOD.md#75-mode-e--QSDattestrejectionfieldrunesmaxnearcap"
            summary: ": recent-rejection ring detail runes_max within 10% of cap"

  - name: "QSDAttestRejectionPersistCompactionsHigh — rate*60 > 5, for:30m"
    interval: 1m
    # 6/min sustained → rate ≈ 0.1/s → rate*60 = 6 > 5.
    input_series:
      - series: 'QSD_attest_rejection_persist_compactions_total'
        values: '0+6x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDAttestRejectionPersistCompactionsHigh
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 36m
        alertname: QSDAttestRejectionPersistCompactionsHigh
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-rejection-flood.json"
            description: "QSD_attest_rejection_persist_compactions_total has\nbeen incrementing at >5/min sustained for 30m on\n. Each compaction means the\non-disk JSONL log crossed its soft-cap and was\nrewritten — at the default softCap=1024 this implies\n~85 rejections/s sustained, ~10× a typical baseline.\nTriage:\n  - Confirm the rejection volume is real, not a\n    metric leak: rate(QSD_attestation_rejected_total[5m]).\n  - Identify the dominant rejection kind / miner:\n    topk(5, rate(QSD_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Inspect recent records for a hostile pattern:\n    GET /api/v1/attest/recent-rejections?limit=50\n  - If a miner is spamming, consider tightening the\n    §4.6 cap (operator policy) or applying a P2P\n    rate-limit at the libp2p gate.\nThe QSD_attest_rejection_persist_records_on_disk\ngauge will hover near softCap during the spike;\nafter the spike subsides it should drift down on\nthe next compaction with no operator action.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/REJECTION_FLOOD.md#71-mode-a--QSDattestrejectionpersistcompactionshigh"
            summary: ": recent-rejection ring is compacting 6× per minute"

  - name: "QSDAttestRejectionPersistHardCapDropping — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'QSD_attest_rejection_persist_hardcap_drops_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDAttestRejectionPersistHardCapDropping
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDAttestRejectionPersistHardCapDropping
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-rejection-flood.json"
            description: "QSD_attest_rejection_persist_hardcap_drops_total has\nbeen incrementing for ≥10m on .\nThe on-disk JSONL log has hit its configured byte\nceiling AND the salvage compaction loop is not\nfreeing enough headroom for new records, so the\nFilePersister is now dropping incoming records to\nstay within budget.\n\nThe in-memory ring is unaffected — operators reading\nthe dashboard tile or /api/v1/attest/recent-rejections\ncontinue to see every record. ONLY the durable\nforensic-record persistence is being dropped.\n\nTriage:\n  - Confirm a flood is in progress:\n    rate(QSD_attestation_rejected_total[5m])\n  - Check the hard cap configuration vs current\n    file size:\n    QSD_attest_rejection_persist_records_on_disk\n  - Identify the dominant offender:\n    topk(5, rate(QSD_attestation_rejected_total{kind!=\"\"}[5m]))\n  - Mitigations (operator policy):\n    * Raise cfg.RecentRejectionsMaxBytes if disk\n      budget allows — gives the soft-cap loop more\n      headroom but trades disk for durability.\n    * Raise softCap so each rewrite trims more —\n      amortises the I/O cost of the compaction loop.\n    * Apply a libp2p / mempool rate-limit on the\n      offending miner so the rejection volume drops\n      to baseline and the soft-cap loop catches up.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/REJECTION_FLOOD.md#72-mode-b--QSDattestrejectionpersisthardcapdropping"
            summary: ": recent-rejection persister is shedding records at the hard byte cap"

  - name: "QSDAttestRejectionPerMinerRateLimited — rate > 0, for:10m"
    interval: 1m
    input_series:
      - series: 'QSD_attest_rejection_per_miner_rate_limited_total'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDAttestRejectionPerMinerRateLimited
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDAttestRejectionPerMinerRateLimited
        exp_alerts:
        - exp_labels:
            severity: "warning"
            subsystem: "v2-attest"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-rejection-flood.json"
            description: "QSD_attest_rejection_per_miner_rate_limited_total has\nbeen incrementing for ≥10m on .\nOne or more miners have exhausted their per-miner\ntoken bucket and Store.Record is dropping their\nrecords at entry — neither the in-memory ring nor\nthe persister see them.\n\nThis is the EARLIEST defence in the rejection-ring\nstack: it fires before hard-cap drops, before\nsoft-cap compactions, and before per-field rune\ntruncation. A non-zero rate means the operator\npolicy (cfg.RecentRejectionsRateLimitPerSec) is\nactively shedding what would otherwise be a flood.\n\nTriage:\n  - Identify the offending miner_addr from the\n    dashboard \"top offenders\" strip:\n    /dashboard → Recent Attestation Rejections.\n  - Cross-check against the verifier's per-arch\n    rejection counters:\n    topk(5, rate(QSD_attestation_rejected_total{kind!=\"\"}[5m])\n      by (miner_addr))\n  - If exactly one miner_addr dominates: apply a\n    libp2p / mempool ban or rate-limit at the\n    gate so the rejection volume drops to baseline.\n  - If many miner_addrs share the load: the\n    limiter rate may be too tight. Loosen\n    cfg.RecentRejectionsRateLimitPerSec or\n    widen the burst.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/REJECTION_FLOOD.md#73-mode-c--QSDattestrejectionperminerratelimited"
            summary: ": per-miner rate-limit is dropping records at recent-rejection ring entry"

