    interval: 1m
    input_series:
      - series: 'QSD_chain_height'
        values: '100x30'
      - series: 'QSD_process_uptime_seconds'
        values: '400+60x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDMiningChainStuck
