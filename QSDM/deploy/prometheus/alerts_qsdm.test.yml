            description: "Block production has stalled. v2 mining alerts above\n(slash, enrollment) will go quiet because the applier\nis the consumer of these counters. Triage in this\norder:\n  1. QSD_mempool_size — growing? validator stuck on\n     admission. Empty? validator never built a block.\n  2. QSD_validators_active — quorum?\n  3. Process logs for \"ProduceBlock\" errors — the\n     \"all transactions failed\" path silently freezes\n     the producer when no tx applies.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/MINING_LIVENESS.md#31-mode-a--QSDminingchainstuck"
