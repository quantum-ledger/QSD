          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-stub-deployment-incident.json"
            description: "QSD_stub_active{kind=\"poe\"} == 1 on\n for ≥5m.\n\nA stub-shipped code path is active in this binary. Some\nstubs are operationally dangerous in production:\n\n  - kind=\"poe\": non-CGO consensus ACCEPTS transactions\n    WITHOUT signature verification. Hard-fail security\n    event in production. Rebuild with CGO_ENABLED=1 and\n    liboqs available.\n\n  - kind=\"dilithium\" / \"wallet\": quantum-safe ML-DSA-87\n    not available; SHA-256 fallback in use. Downgrade\n    from the v2 mining protocol's quantum-safe promise.\n    Rebuild with CGO + liboqs.\n\n  - kind=\"cc\": nvidia-cc-v1 stub verifier rejects every\n    proof. Validators using this stub admit zero v2\n    mining proofs of Type=nvidia-cc-v1 (Phase 2c-iv work\n    pending). Replace cc.NewStubVerifier() with the real\n    AIK verifier in the validator wiring.\n\n  - kind=\"slashing\": at least one EvidenceKind is wired\n    to the StubVerifier (always rejects). Slash txs of\n    that kind silently fail. Replace the StubVerifier\n    registration in slashing.NewProductionDispatcher\n    with the real per-kind verifier.\n\n  - kind=\"mesh3d_cuda\": CUDA acceleration unavailable;\n    CPU fallback in use. Functionally correct but\n    throughput will be far below CUDA-enabled capacity.\n\n  - kind=\"wasm_sdk\": WASM module execution unavailable\n    (non-CGO). Modules configured under [wasm.*] will\n    all fail to load.\n\nTriage:\n  - See QSD/docs/docs/runbooks/STUB_DEPLOYMENT_INCIDENT.md\n    for the kind-specific remediation (the runbook_url\n    above anchors directly into the right section).\n  - This alert is for:5m which means a brand-new node\n    boot will not page; the gauge has to remain 1 for\n    two scrape windows.\n  - To see all currently-active kinds:\n      QSD_stub_active == 1\n    and group by `kind` for an at-a-glance summary.\n  - This alert NEVER auto-resolves until the binary is\n    redeployed with the stub replaced. There is no\n    \"transient\" stub-active condition.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/STUB_DEPLOYMENT_INCIDENT.md#kind-poe"
            summary: ": stub implementation active for kind=poe"

  # -------------------------------------------------------------------
  # QSD-wallet — wallet HTTP API health
  # WALLET_INCIDENT.md §3.1 / §3.2 / §3.3
  # -------------------------------------------------------------------

  - name: "QSDWalletSendErrorRate — handler-failure ratio > 0.1, for:10m"
    interval: 1m
    # Total send rate = 60/min (success 40/min + store_failed
    # 20/min). store_failed/total = 20/60 ≈ 0.33, well above
    # the 0.1 threshold. instance label propagates from input.
    input_series:
      - series: 'QSD_wallet_send_total{result="success",instance="i1"}'
        values: '0+40x40'
      - series: 'QSD_wallet_send_total{result="store_failed",instance="i1"}'
        values: '0+20x40'
    alert_rule_test:
      - eval_time: 5m
        alertname: QSDWalletSendErrorRate
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 16m
        alertname: QSDWalletSendErrorRate
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-wallet-incident.json"
            description: "QSD_wallet_send_total handler-side failure ratio\n(tx_create_failed + store_failed + no_wallet_service +\nnvidia_lock_blocked) / total > 10% on\ni1 for ≥10m.\n\nSubmesh-policy and dedupe rejects are NOT counted in\nthis ratio — they live in\nQSD_submesh_api_wallet_reject_*_total and\nQSD_p2p_wallet_ingress_dedupe_skip_total respectively\n(covered by QSDSubmeshAPISustained422 and the\nquarantine pipeline).\n\nTriage:\n  - Drill into the failure tag breakdown:\n      topk(3,\n        sum by (result) (rate(QSD_wallet_send_total{result!=\"success\"}[5m])))\n    The dominant tag tells you the failure mode.\n  - tx_create_failed → wallet service init issue\n    (CGO/liboqs); cross-check QSD_stub_active{kind=\"wallet\"}.\n  - store_failed → storage wedge; cross-check\n    QSDNoTransactionsStored and the storage-backend\n    runbook (OPERATOR_HYGIENE_INCIDENT.md §3.4).\n  - no_wallet_service → wallet didn't initialize at\n    node boot; check startup logs for liboqs/OpenSSL\n    errors.\n  - nvidia_lock_blocked → NVIDIA-lock proof ring is\n    empty or the gate is misconfigured; cross-check\n    NGC_SUBMISSION_INCIDENT.md and OPERATOR_HYGIENE\n    §3.1 / §3.2.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/WALLET_INCIDENT.md#31-mode-a--QSDwalletsenderrorrate"
            summary: "i1: /api/v1/wallet/send error rate above 10% for ≥10m"

  - name: "QSDWalletStorageErrorBurst — rate*60 > 1, for:5m"
    interval: 1m
    # Combined wallet storage-error rate at 2/min (1 from
    # balance, 1 from send) → rate*60 = 2 > 1. Crosses for:5m.
    input_series:
      - series: 'QSD_wallet_balance_query_total{result="storage_error",instance="i1"}'
        values: '0+1x40'
      - series: 'QSD_wallet_send_total{result="store_failed",instance="i1"}'
        values: '0+1x40'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDWalletStorageErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 8m
        alertname: QSDWalletStorageErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-wallet-incident.json"
            description: "Combined rate of QSD_wallet_balance_query_total{result=\"storage_error\"}\n+ QSD_wallet_send_total{result=\"store_failed\"} on\ni1 exceeds 1/min for ≥5m.\n\nThis indicates the storage backend (BoltDB/Badger) is\nfailing reads OR writes from the wallet API surface.\nTriage:\n  - Cross-check QSDNoTransactionsStored\n    (OPERATOR_HYGIENE_INCIDENT.md §3.4) — if firing\n    concurrently, the storage wedge is system-wide\n    and not wallet-specific.\n  - Cross-check QSDMiningChainStuck\n    (MINING_LIVENESS.md §3.1) — block production\n    will follow if storage stays wedged.\n  - Inspect node logs for \"Failed to get balance\" /\n    \"Failed to store transaction\" and the underlying\n    storage error.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/WALLET_INCIDENT.md#32-mode-b--QSDwalletstorageerrorburst"
            summary: "i1: wallet API storage errors > 1/min for ≥5m"

  - name: "QSDWalletMintBurst — rate*60 > 5, for:30m"
    interval: 1m
    # 10 mints/min sustained for the full 40m → rate*60 = 10
    # > 5 threshold. Crosses for:30m at 35m.
    input_series:
      - series: 'QSD_wallet_mint_total{result="success",instance="i1"}'
        values: '0+10x40'
    alert_rule_test:
      - eval_time: 15m
        alertname: QSDWalletMintBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 36m
        alertname: QSDWalletMintBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            result: "success"
            severity: "warning"
            subsystem: "v2-wallet"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-wallet-incident.json"
            description: "QSD_wallet_mint_total{result=\"success\"} on\ni1 has been incrementing at\n>5/min sustained for ≥30m (≥150 mints in the window).\n\n$CELL mint is admin-only and gated by NVIDIA-lock.\nSustained successful mint volume regardless of policy\nis a supply-inflation signal:\n  - Legitimate cause: an admin running a test campaign\n    without notifying ops. Confirm out-of-band with\n    the operator who owns the API credentials.\n  - Adversarial cause: compromised admin credentials.\n    Rotate the credential and audit the recipient\n    addresses against the legitimate-recipient list.\n\nTriage:\n  - List the mint amounts and recipients from logs:\n    grep '\"coin\":\"CELL\"' on the validator's stdout.\n  - Cross-check QSDGovAuthorityVoteRecorded — if a\n    governance vote authorized the campaign, the vote\n    will be in the chain.\n  - If recipient is not on the legitimate list, treat\n    as a credential compromise: rotate, restrict, and\n    file an incident report.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/WALLET_INCIDENT.md#33-mode-c--QSDwalletmintburst"
            summary: "i1: $CELL mint rate > 5/min for ≥30m"

  # -------------------------------------------------------------------
  # QSD-storage — storage backend health
  # STORAGE_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDStorageWriteErrorBurst — store_transaction err rate*60 > 1, for:5m"
    interval: 1m
    # 2 errors/min sustained → rate*60 = 2 > 1 threshold.
    # Crosses for:5m at 6m.
    input_series:
      - series: 'QSD_storage_op_total{op="store_transaction",result="error",instance="i1"}'
        values: '0+2x40'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDStorageWriteErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 8m
        alertname: QSDStorageWriteErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "store_transaction"
            result: "error"
            severity: "warning"
            subsystem: "v2-storage"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-storage-incident.json"
            description: "QSD_storage_op_total{op=\"store_transaction\",result=\"error\"}\nrate on i1 has been > 1/min sustained\nfor ≥5m. The storage backend (SQLite / FileStorage / Scylla)\nis rejecting transaction writes.\n\nTriage:\n  - Drill into the success-vs-error ratio to confirm the\n    magnitude:\n      rate(QSD_storage_op_total{op=\"store_transaction\",result=\"error\"}[5m])\n      /\n      rate(QSD_storage_op_total{op=\"store_transaction\"}[5m])\n  - Cross-check QSDNoTransactionsStored: if firing\n    concurrently, ZERO transactions are completing\n    (full storage wedge); if NOT firing, some writes\n    are getting through but a fraction are failing\n    (lock contention, partial disk failure, transient\n    Scylla quorum loss).\n  - Cross-check QSDWalletStorageErrorBurst: if firing\n    concurrently, the wallet API surface is seeing the\n    failures end-to-end (this is expected). If NOT\n    firing but QSDStorageWriteErrorBurst is, the\n    error volume is from p2p ingress (libp2p\n    accepting txs that storage then rejects) rather\n    than the wallet API.\n  - Inspect node logs for storage error messages\n    (SQLite \"database is locked\", Scylla \"quorum\",\n    FileStorage \"no space left\").\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/STORAGE_INCIDENT.md#31-mode-a--QSDstoragewriteerrorburst"
            summary: "i1: storage StoreTransaction errors > 1/min for ≥5m"

  - name: "QSDStorageReadyFailing — ready err rate > 0, for:2m"
    interval: 1m
    # 1 ready error/min → rate > 0. Crosses for:2m at 3m.
    input_series:
      - series: 'QSD_storage_op_total{op="ready",result="error",instance="i1"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 1m
        alertname: QSDStorageReadyFailing
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 5m
        alertname: QSDStorageReadyFailing
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "ready"
            result: "error"
            severity: "critical"
            subsystem: "v2-storage"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-storage-incident.json"
            description: "QSD_storage_op_total{op=\"ready\",result=\"error\"} is\nnon-zero on i1 for ≥2m. The\nstorage backend is reporting itself unhealthy on the\nhealth-probe path — either fully offline or\nunreachable.\n\nLikely causes:\n  - SQLite: db file deleted, FS unmounted, fsync\n    failure on the journal.\n  - FileStorage: storage directory removed or\n    permissions broken.\n  - Scylla: session lost (auth expiry, TLS cert\n    rotation, network partition to the cluster).\n\nImmediate consequences:\n  - /api/v1/health returns 503 — load balancers\n    will (correctly) take this node out of rotation.\n  - QSDNoTransactionsStored will follow within\n    30m if this stays unresolved.\n  - QSDMiningChainStuck will follow if a majority\n    of validators hit this concurrently.\n\nTriage:\n  - Confirm the underlying backend is reachable:\n      - SQLite: `ls -la <db-path>` from the node.\n      - FileStorage: `ls -la <storage-dir>`.\n      - Scylla: `cqlsh <host>` from the node.\n  - If the backend is alive but the validator can't\n    reach it, the issue is between the node and the\n    backend (DNS, TLS, auth, firewall). Restart\n    with the correct config.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/STORAGE_INCIDENT.md#32-mode-b--QSDstoragereadyfailing"
            summary: "i1: storage Ready() probe failing"

  # -------------------------------------------------------------------
  # QSD-p2p — libp2p peer-graph health
  # NETWORKING_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDP2PNoPeers — peers == 0 with provider live, for:5m"
    interval: 1m
    # peers stays 0 the whole interval; alert crosses
    # for:5m at 6m.
    input_series:
      - series: 'QSD_p2p_peers_connected{provider="live",instance="i1"}'
        values: '0+0x30'
    alert_rule_test:
      - eval_time: 4m
        alertname: QSDP2PNoPeers
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 7m
        alertname: QSDP2PNoPeers
        exp_alerts:
        - exp_labels:
            instance: "i1"
            provider: "live"
            severity: "warning"
            subsystem: "v2-networking"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-networking-incident.json"
            description: "QSD_p2p_peers_connected{instance=\"i1\",provider=\"live\"}\nhas been 0 for ≥5m. The validator is islanded from\nthe rest of the network — no inbound gossip, no\noutbound publish reachability. Mining / consensus\nparticipation is effectively dead while in this\nstate.\n\nCommon causes:\n  - libp2p TCP port not reachable (firewall change,\n    k8s service config drift, wrong host port).\n  - mDNS-only test deploy on a host with no peer\n    neighbours.\n  - Bootstrap peer list is wrong / unreachable.\n  - libp2p host shutdown but process not crashed\n    (Network.Close() was called and never replaced).\n\nTriage:\n  - On the node: `ss -tnp | grep <libp2p-port>` to\n    confirm the listener is bound and accepting.\n  - From a known-good peer: try to dial this host\n    directly and confirm whether it accepts the\n    connection.\n  - Check `QSD_p2p_messages_total{direction=\"in\"}`\n    rate — if 0 across the whole fleet, the\n    ingress side of gossip is dead at every node\n    (likely a deploy-wide config issue, not a\n    single-host problem).\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/NETWORKING_INCIDENT.md#31-mode-a--QSDp2pnopeers"
            summary: "i1: libp2p peer count == 0 for ≥5m"

  - name: "QSDP2PGossipIngressStalled — peers > 0 + zero inbound rate for 10m, for:10m"
    interval: 1m
    # peers stays at 5 (provider="live"), inbound counter
    # flatlines at 0 for the full 30m. The 10m rate window
    # + 10m for: gives a cross at 20m.
    input_series:
      - series: 'QSD_p2p_peers_connected{provider="live",instance="i1"}'
        values: '5+0x30'
      - series: 'QSD_p2p_messages_total{direction="in",instance="i1"}'
        values: '0+0x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: QSDP2PGossipIngressStalled
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 22m
        alertname: QSDP2PGossipIngressStalled
        exp_alerts:
        - exp_labels:
            instance: "i1"
            provider: "live"
            severity: "warning"
            subsystem: "v2-networking"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-networking-incident.json"
            description: "On i1, QSD_p2p_peers_connected\n> 0 but the inbound message rate is exactly zero\nfor ≥10m. The validator's libp2p host has live\nconnections that aren't producing pubsub\ntraffic.\n\nLikely:\n  - Subscription on the QSD-transactions topic\n    was dropped (e.g. context cancellation but\n    handleMessages goroutine still nominally\n    \"running\").\n  - One-way network partition: outbound dials work,\n    inbound payload delivery is silently dropped\n    (NAT misconfiguration, asymmetric firewall).\n  - All connected peers have been quarantined or\n    are themselves muted from the topic.\n\nTriage:\n  - Cross-check QSDQuarantineAnySubmesh — if\n    co-firing, our peer set is silenced by quarantine\n    policy rather than broken at the network layer.\n  - Restart the validator. handleMessages re-binds\n    the subscription cleanly on startup, so a\n    bounce is the cheapest recovery for transient\n    cases. If the alert re-fires immediately\n    after restart, it's a network-layer issue,\n    not a goroutine drift.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/NETWORKING_INCIDENT.md#32-mode-b--QSDp2pgossipingressstalled"
            summary: "i1: peers > 0 but no inbound gossip for ≥10m"

  # -------------------------------------------------------------------
  # QSD-contracts-bridge — contract exec + bridge op health
  # CONTRACTS_BRIDGE_INCIDENT.md §3.1 / §3.2
  # -------------------------------------------------------------------

  - name: "QSDContractExecuteErrorRate — exec error rate > 50% with >=1/min, for:15m"
    interval: 1m
    # 1 success/min + 2 error/min sustained → error ratio
    # = 2/3 > 0.5 with rate=3/min ≥ 1/min. Crosses for:15m
    # at ~30m.
    input_series:
      - series: 'QSD_contract_executions_total{result="success",instance="i1"}'
        values: '0+1x40'
      - series: 'QSD_contract_executions_total{result="error",instance="i1"}'
        values: '0+2x40'
    alert_rule_test:
      - eval_time: 14m
        alertname: QSDContractExecuteErrorRate
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 32m
        alertname: QSDContractExecuteErrorRate
        exp_alerts:
        - exp_labels:
            instance: "i1"
            result: "error"
            severity: "warning"
            subsystem: "v2-contracts"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-contracts-bridge-incident.json"
            description: "ContractEngine.ExecuteContract on\ni1 has been failing at >50%\nof total volume (with ≥1 call/min) sustained for\n≥15m. Likely:\n  - WASM runtime regression (per-contract wazero\n    or shared wazero failing systematically).\n  - Gas envelope misconfiguration causing the\n    majority of calls to exhaust their limit.\n  - ABI/codec drift after a deploy: callers are\n    passing args the contracts no longer accept.\n  - simulation-fallback path producing an error\n    where the real WASM runtime would have\n    succeeded.\n\nTriage:\n  - Inspect node logs for \"function not found\",\n    \"gas exhausted\", or runtime panic stacks.\n  - Cross-check QSD_stub_active{kind=\"wasm_sdk\"} —\n    if 1, the WASM SDK stub is active, which can\n    produce systematic errors. See\n    STUB_DEPLOYMENT_INCIDENT.md.\n  - If failure is concentrated to a single\n    contract, that contract has likely shipped a\n    broken update; consider rolling it back.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/CONTRACTS_BRIDGE_INCIDENT.md#31-mode-a--QSDcontractexecuteerrorrate"
            summary: "i1: contract execution error rate > 50% for ≥15m"

  - name: "QSDBridgeOpErrorBurst — bridge error rate > 0.2/min for 10m, for:10m"
    interval: 1m
    # 1 redeem error per minute → rate*60 = 1 > 0.2. The
    # 10m rate window saturates at 10m, then for:10m
    # fires at 20m.
    input_series:
      - series: 'QSD_bridge_op_total{op="redeem",result="error",instance="i1"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 9m
        alertname: QSDBridgeOpErrorBurst
        # Condition holds at this checkpoint but `for:` has not
        # elapsed; no alert should be firing yet.
        exp_alerts: []
      - eval_time: 22m
        alertname: QSDBridgeOpErrorBurst
        exp_alerts:
        - exp_labels:
            instance: "i1"
            op: "redeem"
            result: "error"
            severity: "warning"
            subsystem: "v2-bridge"
          exp_annotations:
            dashboard_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/deploy/grafana/dashboards/QSD-runbook-contracts-bridge-incident.json"
            description: "BridgeProtocol on i1 has had\nerrors at >0.2/min sustained for ≥10m. Drill by\nop tag to identify the failing stage:\n\n  topk(3, sum by (op) (rate(QSD_bridge_op_total{result=\"error\"}[10m])))\n\nPer-op interpretation:\n  - op=\"lock\": secret-generation failed, or the\n    source-chain lock state is stuck. Inspect\n    generateSecret / generateLockID call paths.\n  - op=\"redeem\": invalid-secret spam (adversarial\n    or buggy redeemer client) OR cross-chain\n    proof failures. Cross-reference with\n    QSD_p2p_messages_total — a redeem-error\n    burst with no other p2p activity hints at\n    spam.\n  - op=\"refund\": post-expiry recovery is failing\n    — locks aren't transitioning to LockStatusRefunded.\n    This is the highest-stakes case: funds are\n    stuck. Investigate immediately.\n"
            runbook_url: "https://github.com/blackbeardONE/QSD/blob/main/QSD/docs/docs/runbooks/CONTRACTS_BRIDGE_INCIDENT.md#32-mode-b--QSDbridgeoperrorburst"
            summary: "i1: bridge op error rate > 0.2/min for ≥10m"

  # -------------------------------------------------------------------
  # QSD-reputation — peer-reputation tracker health
  # REPUTATION_INCIDENT.md §3.1 / §3.2
