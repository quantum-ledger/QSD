# /etc/ssh/sshd_config.d/99-QSD-hardening.conf
# Keys-only auth for root; general password auth also disabled.
# Drop-in files in /etc/ssh/sshd_config.d override earlier settings (first match wins),
# but Ubuntu 24.04 includes this dir *before* the main 50-cloud-init.conf "PasswordAuthentication yes"
# is set via `Include`. We re-assert our policy via a Match block that cannot be re-overridden.

PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
UsePAM yes
MaxAuthTries 3
LoginGraceTime 30s
ClientAliveInterval 60
ClientAliveCountMax 3

# Make sure nothing sneaks password auth back in for any user.
Match all
    PasswordAuthentication no
    KbdInteractiveAuthentication no
