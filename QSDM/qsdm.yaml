# QSD Configuration for Development (Game Integration)
# This config disables TLS and uses HTTP on port 8080

# Network Configuration
network:
  port: 4001
  bind_address: "127.0.0.1"
  bootstrap_peers: []

# Storage Configuration
storage:
  type: "sqlite"  # Local validator uses SQLite when built with CGO.
  sqlite_path: "QSD.db"

# Monitoring Configuration
monitoring:
  dashboard_port: 8081
  dashboard_bind_address: "127.0.0.1"
  log_viewer_port: 8082  # Changed from 8080 to avoid conflict with API
  log_file: "QSD.log"
  log_level: "INFO"

# API Server Configuration (HTTP for development)
api:
  port: 8080
  bind_address: "127.0.0.1"
  enable_tls: false  # Disable TLS for development
  tls_cert_file: ""
  tls_key_file: ""

# Wallet Configuration
wallet:
  initial_balance: 1000.0

# Governance Configuration
governance:
  proposal_file: "proposals.json"

# Performance Configuration
performance:
  demo_transactions: false
  transaction_interval: "30s"
  health_check_interval: "30s"
