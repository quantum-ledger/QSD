# NVIDIA NGC–aligned sidecar (see ../../nvidia_locked_QSD_blockchain_architecture.md)
#
# CPU stack (small image):
#   docker compose up --build
#
# GPU stack (nvcr.io/pytorch; requires `docker login nvcr.io` — see README):
#   docker compose --profile gpu up --build
#   Or: scripts/run-gpu.ps1 (Windows) / scripts/run-gpu.sh (Unix)
#
services:
  gossip:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "/app/gossip_daemon.py"]
    ports:
      - "9910:9910/udp"
    environment:
      QSD_MESH_PORT: "9910"

  validator-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QSD_GOSSIP_PEERS: "gossip:9910"
      # QSD_NGC_REPORT_URL (or legacy QSDPLUS_NGC_REPORT_URL) — see scripts/wire-QSD.ps1 or wire-QSD.sh
      # QSD_NGC_INGEST_SECRET (or legacy QSDPLUS_NGC_INGEST_SECRET) — must match the node
      # QSD_NGC_PROOF_NODE_ID (or legacy QSDPLUS_NGC_PROOF_NODE_ID) — optional; must match node QSD_NVIDIA_LOCK_EXPECTED_NODE_ID when lock binding is on
    depends_on:
      - gossip

  validator-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.ngc
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QSD_GOSSIP_PEERS: "gossip:9910"
      # Same NGC env vars as validator-cpu when pushing proofs to the node (GPU profile for NVIDIA-lock).
    depends_on:
      - gossip
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
